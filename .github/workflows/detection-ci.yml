name: Detection CI

on:
  push:
    branches: [main]
    paths:
      - 'sigma_rules/**'
      - 'tests/**'
      - 'scripts/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-and-convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install sigma-cli pysigma pysigma-backend-splunk pysigma-backend-microsoft365defender pyyaml

      - name: Run detection logic tests
        run: |
          python3 tests/test_detections.py

      - name: Check MITRE ATT&CK coverage
        run: |
          python3 scripts/check_coverage.py

      - name: Convert Sigma rules to SPL and KQL
        run: |
          python3 scripts/convert_rules.py

      - name: Upload converted queries as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-detections
          path: converted/

      - name: Commit converted queries back to repo
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add converted/
          git diff --staged --quiet || git commit -m "ci: auto-update converted detections [skip ci]"
          git push